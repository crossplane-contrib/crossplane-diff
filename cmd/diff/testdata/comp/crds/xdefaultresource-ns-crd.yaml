apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: xtestdefaultresources.ns.diff.example.org
spec:
  group: ns.diff.example.org
  names:
    kind: XTestDefaultResource
    plural: xtestdefaultresources
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                crossplane:
                  type: object
                  properties:
                    compositionRef:
                      type: object
                      properties:
                        name:
                          type: string
                    compositionSelector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                    compositeDeletePolicy:
                      type: string
                    compositionUpdatePolicy:
                      type: string
                    resourceRefs:
                      type: array
                      items:
                        type: object
                        required:
                          - apiVersion
                          - kind
                          - name
                        properties:
                          apiVersion:
                            type: string
                          kind:
                            type: string
                          name:
                            type: string
                          namespace:
                            type: string
                          uid:
                            type: string
                          resourceVersion:
                            type: string
                          fieldPath:
                            type: string
                region:
                  type: string
                  default: "us-east-1"
                  description: "AWS region with default value"
                size:
                  type: string
                  default: "small"
                  description: "Instance size with default"
                settings:
                  type: object
                  default:
                    enabled: true
                    timeout: 30
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    timeout:
                      type: integer
                      default: 30
                    retries:
                      type: integer
                      default: 3
                tags:
                  type: object
                  default:
                    environment: "development"
                  properties:
                    environment:
                      type: string
                      default: "development"
                    team:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  description: Conditions of the resource.
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                    properties:
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string