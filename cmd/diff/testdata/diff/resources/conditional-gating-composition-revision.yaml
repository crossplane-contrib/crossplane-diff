apiVersion: apiextensions.crossplane.io/v1
kind: CompositionRevision
metadata:
  name: conditional-gating-composition-rev-1
  labels:
    crossplane.io/composition-name: conditional-gating-composition
spec:
  revision: 1
  compositeTypeRef:
    apiVersion: ns.diff.example.org/v1alpha1
    kind: XNopResource
  mode: Pipeline
  pipeline:
    - step: generate-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: template.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            apiVersion: ns.nop.example.org/v1alpha1
            kind: XDownstreamResource
            metadata:
              name: 0-stage0-resource
              namespace: {{ .observed.composite.resource.metadata.namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: stage0-resource
            spec:
              forProvider:
                configData: {{ .observed.composite.resource.spec.coolField }}
            {{- with .observed.resources -}}
              {{- with (index . "stage0-resource") -}}
                {{- with .resource.status.conditions -}}
                  {{- range . -}}
                    {{- if and (eq .type "Ready") (eq .status "True") }}
            ---
            apiVersion: ns.nop.example.org/v1alpha1
            kind: XDownstreamResource
            metadata:
              name: 1-stage1-resource
              namespace: {{ $.observed.composite.resource.metadata.namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: stage1-resource
            spec:
              forProvider:
                configData: {{ $.observed.composite.resource.spec.coolField }}
                    {{- end -}}
                  {{- end -}}
                {{- end -}}
              {{- end -}}
            {{- end -}}
    - step: mark-ready-from-observed
      functionRef:
        name: function-auto-ready
