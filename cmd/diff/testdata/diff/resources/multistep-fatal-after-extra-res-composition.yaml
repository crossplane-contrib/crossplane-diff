apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: multistep-fatal-after-extra-res.diff.example.org
spec:
  compositeTypeRef:
    apiVersion: ns.diff.example.org/v1alpha1
    kind: XNopResource
  mode: Pipeline
  pipeline:
    # Step 1: guarded gotpl. Emits an ExtraResources requirement AND (once
    # .extraResources is populated on the inner fetcher iteration) a composed
    # resource. Stabilizes cleanly within the single render call.
    - step: render-templates
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              configmaps:
                apiVersion: v1
                kind: ConfigMap
                matchLabels:
                  app: test-app
                  environment: {{ .observed.composite.resource.spec.environment }}
            {{- with .extraResources }}
            {{ $configMaps := index . "configmaps" }}
            {{- range $i, $configMap := $configMaps.items }}
            ---
            apiVersion: ns.nop.example.org/v1alpha1
            kind: XDownstreamResource
            metadata:
              name: {{ $.observed.composite.resource.metadata.name }}
              namespace: {{ $.observed.composite.resource.metadata.namespace }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: nop-resource
            spec:
              forProvider:
                configData: {{ $.observed.composite.resource.spec.coolField }}
                roleName: templated-{{ $configMap.resource.metadata.name }}
            {{- end }}
            {{- end }}
    # Step 2: always fatals. `index .missing.path 0` — .missing is <no value>,
    # indexing returns "index of untyped nil". This step does NOT emit
    # requirements — so rsp.Requirements is nil for this step, but the render
    # library has already accumulated step 1's requirements into its outputs.
    # This produces the combination the PR's render-loop fix addresses:
    # renderErr != nil AND len(output.Requirements) > 0.
    - step: always-fatal
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{ index .missing.path 0 }}
